site_name: stoxnow
site_url: https://stoxnow.com
site_description: Python client for financial market data
site_author: Datastrolab

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Reference:
    - Client: reference/client.md
    - Exceptions: reference/exceptions.md
  - Blog: blog/index.md

plugins:
  - search
  - blog

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Datastrolab/stoxnow
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/stoxnow
